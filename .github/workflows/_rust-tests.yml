name: Rust tests

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    strategy:
      matrix:
        platform: [blacksmith-8vcpu-ubuntu-2404]
    runs-on: ${{ matrix.platform }}
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      RUST_MIN_STACK_SIZE: 8388608
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup
        uses: ./.github/actions/rust
        with:
          github-token: ${{ github.token }}
      - name: Build CLI
        run: cargo build --bin chroma
      - name: Test
        run: cargo nextest run --profile ci
      - name: Doc test
        run: cargo test --doc
  test-long:
    runs-on: blacksmith-8vcpu-ubuntu-2404
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      RUST_MIN_STACK_SIZE: 8388608
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup
        uses: ./.github/actions/rust
        with:
          github-token: ${{ github.token }}
      - name: Test
        run: cargo nextest run --profile ci_long_running

  test-storage-gcs:
    runs-on: blacksmith-8vcpu-ubuntu-2404
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      RUST_MIN_STACK_SIZE: 8388608
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup
        uses: ./.github/actions/rust
        with:
          github-token: ${{ github.token }}
      - name: Extract credentials
        run: |
          echo '${{ secrets.TEST_CRED_GCS }}' > ${{ github.workspace }}/cred_gcs.json
      - name: Test
        run: cargo nextest run --profile storage_gcs
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/cred_gcs.json
          TEST_CMEK_GCS: ${{ secrets.TEST_CMEK_GCS }}

  test-integration:
    strategy:
      matrix:
        include:
          - nextest_profile: ci_k8s_integration
            platform: blacksmith-16vcpu-ubuntu-2404
            partition_method: hash
            partition: 1
            partition_total: 3
          - nextest_profile: ci_k8s_integration
            platform: blacksmith-16vcpu-ubuntu-2404
            partition_method: hash
            partition: 2
            partition_total: 3
          - nextest_profile: ci_k8s_integration
            platform: blacksmith-16vcpu-ubuntu-2404
            partition_method: hash
            partition: 3
            partition_total: 3
          - nextest_profile: ci_k8s_integration_slow
            platform: blacksmith-16vcpu-ubuntu-2404
            partition_method: count
            partition: 1
            partition_total: 2
          - nextest_profile: ci_k8s_integration_slow
            platform: blacksmith-16vcpu-ubuntu-2404
            partition_method: count
            partition: 2
            partition_total: 2
          - nextest_profile: ci_k8s_integration_tilt_parallel
            platform: blacksmith-16vcpu-ubuntu-2404
            partition_method: count
            partition: 1
            partition_total: 1
    runs-on: ${{ matrix.platform }}
    name: Integration test ${{ matrix.nextest_profile }} ${{ matrix.partition }}
    # OIDC token auth for AWS
    permissions:
      contents: read
      id-token: write
    env:
      CARGO_TERM_COLOR: always
      RUST_MIN_STACK_SIZE: 8388608
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup
        uses: ./.github/actions/rust
        with:
          github-token: ${{ github.token }}
      - name: Set up Docker
        uses: ./.github/actions/docker
        with:
          dockerhub-username: ${{ vars.DOCKERHUB_USERNAME }}
          dockerhub-password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Start services in Tilt
        uses: ./.github/actions/tilt
      - name: Build CLI
        run: cargo build --bin chroma
      - name: Run tests
        run: cargo nextest run --profile ${{ matrix.nextest_profile }} --partition ${{ matrix.partition_method }}:${{ matrix.partition }}/${{ matrix.partition_total }} --no-tests warn
      - name: Save service logs to artifact
        if: always()
        uses: ./.github/actions/export-tilt-logs
        with:
          artifact-name: "rust-integration-test-${{ matrix.nextest_profile }}-${{ matrix.partition }}"

