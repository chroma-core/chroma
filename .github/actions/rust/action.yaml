name: Setup Rust
description: "This action sets up Rust"
inputs:
  github-token:
    description: "GitHub token"
    required: false
  workspaces:
    description: "Workspace paths to cache (see documentation on Swatinem/rust-cache for details)"
    required: false
  install-nextest:
    description: "Install cargo-nextest"
    required: false
    default: "true"
runs:
  using: "composite"
  steps:
    - name: Install Protoc
      uses: chroma-core/setup-protoc@v4b
      with:
        repo-token: ${{ inputs.github-token }}
        version: v35.0
    - name: Set up cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: ${{ inputs.workspaces }}
    - name: Setup Nextest
      if: ${{ inputs.install-nextest == 'true' }}
      uses: taiki-e/install-action@nextest
