name: Tilt Setup & Pre-Build
description: Set up Tilt prereqs and pre-build/pull images
runs:
  using: "composite"
  steps:
    - name: Start minikube
      uses: medyagh/setup-minikube@latest
      with:
        driver: none # uses Docker engine on host instead of Docker-in-Docker

    - name: Install Tilt
      shell: bash
      env:
        TILT_VERSION: "0.34.2"
      run: |
        curl -fsSL "https://github.com/tilt-dev/tilt/releases/download/v${TILT_VERSION}/tilt.${TILT_VERSION}.linux.x86_64.tar.gz" \
          | tar -xzv -C /usr/local/bin tilt

    - name: Pre-pull external images
      shell: bash
      run: bash "$GITHUB_ACTION_PATH/pull_external_images.sh"

    # tilt ci can automatically build images while bringing up the cluster.
    # However, this results in flaky runs for our usage so we split up image
    # building and pod deployment into separate steps.
    # See https://github.com/chroma-core/chroma/pull/4720.
    - name: Build service images
      uses: ./.github/actions/build_service_images
      with:
        PUSH: 'false'
        # rust-log-service exposes the FaultInjectionService gRPC endpoint
        # only when compiled with the `faults` cargo feature. Integration
        # tests that drive fault injection depend on this.
        LOG_SERVICE_CARGO_FEATURES: 'faults'
        # Tilt's CI custom_build runs `docker image tag <name>:ci …`, so
        # the built images must be loaded into the host Docker daemon.
        LOAD: 'true'
