sysdb:
  flags:
    version-file-enabled: true
    s3-endpoint: "http://minio.chroma.svc.cluster.local:9000"
    s3-access-key-id: "minio"
    s3-secret-access-key: "minio123"
    s3-force-path-style: true
    create-bucket-if-not-exists: true
    kubernetes-namespace: chroma
  resources:
    limits:
      cpu: 100m
      memory: 384Mi
    requests:
      cpu: 100m
      memory: 128Mi

rustFrontendService:
  # We have to specify the command, because the Dockerfile uses the CLI since its shared with
  # single node, so in values.dev we pass the CONFIG_PATH into the chroma run command
  command: '["chroma", "run", "$(CONFIG_PATH)"]'
  otherEnvConfig: |
    - name: CHROMA_ALLOW_RESET
      value: "true"
    - name: RUST_BACKTRACE
      value: 'value: "1"'
  resources:
    limits:
      cpu: 100m
      memory: 768Mi
    requests:
      cpu: 100m
      memory: 256Mi

queryService:
  env:
    - name: RUST_BACKTRACE
      value: 'value: "1"'
  jemallocConfig: "prof:true,prof_active:true,lg_prof_sample:19"
  resources:
    limits:
      cpu: 100m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 512Mi

compactionService:
  env:
    - name: RUST_BACKTRACE
      value: 'value: "1"'
  cache:
    hostPath: '/local/cache/chroma-compaction-service'
    type: DirectoryOrCreate
    mountPath: '/cache/'
    additionalVolumes: []
  resources:
    limits:
      cpu: 200m
      memory: 1536Mi
    requests:
      cpu: 200m
      memory: 768Mi
workQueueService:
  env:
    - name: RUST_BACKTRACE
      value: 'value: "1"'
  replicaCount: 1
  cache:
    hostPath: '/local/cache/chroma-work-queue-service'
    type: DirectoryOrCreate
    mountPath: '/cache/'
    additionalVolumes: []
  jemallocConfig: "prof:true,prof_active:true,lg_prof_sample:19"
  resources:
    limits:
      cpu: 200m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi

fnConsumer:
  env:
    - name: RUST_BACKTRACE
      value: 'value: "1"'
  replicaCount: 1
  cache:
    hostPath: '/local/cache/chroma-fn-consumer'
    type: DirectoryOrCreate
    mountPath: '/cache/'
    additionalVolumes: []
  resources:
    limits:
      cpu: 200m
      memory: 768Mi
    requests:
      cpu: 200m
      memory: 384Mi

rustLogService:
  replicaCount: 1
  resources:
    limits:
      cpu: 200m
      memory: 768Mi
    requests:
      cpu: 200m
      memory: 512Mi

garbageCollector:
  jemallocConfig: "prof:true,prof_active:true,lg_prof_sample:19"
  resources:
    limits:
      cpu: 100m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 512Mi

rustSysdbService:
  replicaCount: 1
  resources:
    limits:
      cpu: 100m
      memory: 384Mi
    requests:
      cpu: 100m
      memory: 128Mi
