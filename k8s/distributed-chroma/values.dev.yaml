sysdb:
  flags:
    version-file-enabled: true
    s3-endpoint: "http://minio.chroma.svc.cluster.local:9000"
    s3-access-key-id: "minio"
    s3-secret-access-key: "minio123"
    s3-force-path-style: true
    create-bucket-if-not-exists: true
    kubernetes-namespace: chroma
  resources:
    limits:
      cpu: 100m
    requests:
      cpu: 100m

rustFrontendService:
  # We have to specify the command, because the Dockerfile uses the CLI since its shared with
  # single node, so in values.dev we pass the CONFIG_PATH into the chroma run command
  command: '["chroma", "run", "$(CONFIG_PATH)"]'
  otherEnvConfig: |
    - name: CHROMA_ALLOW_RESET
      value: "true"
    - name: RUST_BACKTRACE
      value: "1"
  resources:
    limits:
      cpu: 100m
    requests:
      cpu: 100m

queryService:
  env:
    - name: RUST_BACKTRACE
      value: "1"
  jemallocConfig: "prof:true,prof_active:true,lg_prof_sample:19"
  resources:
    limits:
      cpu: 100m
    requests:
      cpu: 100m

compactionService:
  env:
    - name: RUST_BACKTRACE
      value: "1"
  cache:
    hostPath: '/local/cache/chroma-compaction-service'
    type: DirectoryOrCreate
    mountPath: '/cache/'
    additionalVolumes: []
workQueueService:
  env:
    - name: RUST_BACKTRACE
      value: "1"
  replicaCount: 1
  cache:
    hostPath: '/local/cache/chroma-work-queue-service'
    type: DirectoryOrCreate
    mountPath: '/cache/'
    additionalVolumes: []
  jemallocConfig: "prof:true,prof_active:true,lg_prof_sample:19"
  resources:
    limits:
      cpu: 200m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 512Mi
  configuration: |
    work_queue:
      enabled: true
      storage_path: "work-queue/queue.parquet"
      persistence:
        time_threshold_seconds: 30
        operation_threshold: 100
      grpc_port: 50054
      memberlist_provider:
        custom_resource:
          kube_namespace: "chroma"
          memberlist_name: "work-queue-service-memberlist"
      my_member_id: work-queue-service-0

rustLogService:
  replicaCount: 1
  resources:
    limits:
      cpu: 200m
    requests:
      cpu: 200m

garbageCollector:
  jemallocConfig: "prof:true,prof_active:true,lg_prof_sample:19"
  resources:
    limits:
      cpu: 100m
    requests:
      cpu: 100m

rustSysdbService:
  replicaCount: 1
  resources:
    limits:
      cpu: 100m
    requests:
      cpu: 100m
