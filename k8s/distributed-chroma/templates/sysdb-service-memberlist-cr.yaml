---
apiVersion: chroma.cluster/v1
kind: MemberList
metadata:
  name: sysdb-service-memberlist
  namespace: {{ .Values.namespace }}
spec:
  members:
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sysdb-service-memberlist-readerwriter
rules:
- apiGroups:
    - chroma.cluster
  resources:
    - memberlists
  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete
  resourceNames:
    - sysdb-service-memberlist
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sysdb-sysdb-service-memberlist-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sysdb-service-memberlist-readerwriter
subjects:
- kind: ServiceAccount
  name: sysdb-serviceaccount
  namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rust-frontend-service-sysdb-service-memberlist-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sysdb-service-memberlist-readerwriter
subjects:
- kind: ServiceAccount
  name: rust-frontend-service-serviceaccount
  namespace: {{ .Values.namespace }}
