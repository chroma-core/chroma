apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: chroma2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: chroma-postgres
          # Mirrors the chroma-namespace postgres (k8s/test/postgres.yaml):
          # 200m guaranteed share for the auth path under contention, 500m
          # burst. Sized so this region-2 postgres and the region-1 one
          # both fit a single CI runner under MULTI_REGION/MCMR. Keep the
          # two in sync.
          resources:
            requests:
              cpu: "200m"
            limits:
              cpu: "500m"
          env:
            - name: POSTGRES_MULTIPLE_DATABASES
              value: "sysdb,log"
            - name: POSTGRES_USER
              value: chroma
            - name: POSTGRES_PASSWORD
              value: chroma
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - chroma
            periodSeconds: 1
            failureThreshold: 10

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: chroma2
spec:
  ports:
    - name: postgres-port
      port: 5432
      targetPort: 5432
  selector:
    app: postgres
  type: ClusterIP
