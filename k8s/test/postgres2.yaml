apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: chroma2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: chroma-postgres
          # Mirrors the chroma-namespace postgres (k8s/test/postgres.yaml):
          # small 100m request (bin-packs region-1 + region-2 into the
          # ~4 vCPU MULTI_REGION/MCMR cluster — scheduling counts requests,
          # not limits) + 1000m burst limit (the original starvation was
          # the 100m *ceiling*; the limit lets postgres use idle CPU during
          # the startup connection storm). Keep the two in sync.
          resources:
            requests:
              cpu: "100m"
            limits:
              cpu: "1000m"
          env:
            - name: POSTGRES_MULTIPLE_DATABASES
              value: "sysdb,log"
            - name: POSTGRES_USER
              value: chroma
            - name: POSTGRES_PASSWORD
              value: chroma
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - chroma
            periodSeconds: 1
            failureThreshold: 10

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: chroma2
spec:
  ports:
    - name: postgres-port
      port: 5432
      targetPort: 5432
  selector:
    app: postgres
  type: ClusterIP
